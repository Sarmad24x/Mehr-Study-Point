name: mehr_study_point
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Others
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3
  equatable: ^2.0.5
  intl: ^0.19.0
  uuid: ^4.5.2
  csv: ^6.0.0
  share_plus: ^10.1.3
  fl_chart: ^0.70.2
  mask_text_input_formatter: ^2.9.0
  google_fonts: ^8.0.0
  pdf: ^3.11.1
  printing: ^5.13.2
  flutter_launcher_icons: ^0.14.4
  google_sign_in: ^6.2.2
  collection: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0

  # Code Generators
  hive_generator: ^2.0.1
  build_runner: ^2.4.10

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21 # should match your minSdk in build.gradle
  adaptive_icon_background: "#FFFFFF" # Background color for Android adaptive icons
  adaptive_icon_foreground: "assets/images/app_icon.png" # The icon itself
